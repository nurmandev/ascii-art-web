<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASCII Art Generator</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --text-color: #f8fafc;
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --surface: #1e293b;
            --surface-border: #334155;
            --accent: #10b981;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding: 2rem;
            line-height: 1.5;
        }

        .container {
            width: 100%;
            max-width: 800px;
            background: var(--surface);
            padding: 2rem;
            border-radius: 1rem;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5), 0 10px 10px -5px rgba(0, 0, 0, 0.2);
            border: 1px solid var(--surface-border);
            animation: fadeIn 0.5s ease-out;
            margin-top: 2rem;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            text-align: center;
            margin-bottom: 2rem;
            font-weight: 600;
            background: linear-gradient(135deg, #3b82f6, #10b981);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        label {
            font-weight: 600;
            font-size: 0.9rem;
            color: #cbd5e1;
        }

        textarea {
            width: 100%;
            padding: 1rem;
            border-radius: 0.5rem;
            background-color: var(--bg-color);
            border: 1px solid var(--surface-border);
            color: var(--text-color);
            font-family: 'Inter', sans-serif;
            resize: vertical;
            min-height: 120px;
            transition: border-color 0.3s ease;
        }

        textarea:focus {
            outline: none;
            border-color: var(--primary);
        }

        .banners {
            display: flex;
            gap: 1.5rem;
            flex-wrap: wrap;
        }

        .radio-label {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            background-color: var(--bg-color);
            border: 1px solid var(--surface-border);
            transition: all 0.3s ease;
        }

        .radio-label:hover {
            border-color: var(--primary);
        }

        input[type="radio"] {
            accent-color: var(--primary);
            width: 1rem;
            height: 1rem;
        }

        input[type="radio"]:checked + span {
            color: var(--primary);
            font-weight: 600;
        }

        button {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 1rem;
            border-radius: 0.5rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.3s ease, transform 0.1s ease;
        }

        button:hover {
            background-color: var(--primary-hover);
        }

        button:active {
            transform: scale(0.98);
        }

        .result-container {
            margin-top: 2rem;
            padding-top: 2rem;
            border-top: 1px solid var(--surface-border);
            animation: fadeIn 0.5s ease-out;
            overflow-x: auto;
        }

        .result-container h2 {
            margin-bottom: 1rem;
            font-size: 1.2rem;
            color: #cbd5e1;
        }

        pre {
            background-color: var(--bg-color);
            padding: 1.5rem;
            border-radius: 0.5rem;
            color: var(--accent);
            font-family: monospace;
            white-space: pre;
            border: 1px solid var(--surface-border);
            font-size: 14px;
            line-height: 1.2;
            overflow-x: auto;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>ASCII Art Web</h1>
        <form action="/ascii-art" method="POST">
            <div class="input-group">
                <label for="text">Text to Translate</label>
                <textarea id="text" name="text" placeholder="Type something cool..." required>{{.Text}}</textarea>
            </div>
            
            <div class="input-group">
                <label>Choose a Banner</label>
                <div class="banners">
                    <label class="radio-label">
                        <input type="radio" name="banner" value="standard" {{if eq .Banner "standard"}}checked{{else if not .Banner}}checked{{end}}>
                        <span>Standard</span>
                    </label>
                    <label class="radio-label">
                        <input type="radio" name="banner" value="shadow" {{if eq .Banner "shadow"}}checked{{end}}>
                        <span>Shadow</span>
                    </label>
                    <label class="radio-label">
                        <input type="radio" name="banner" value="thinkertoy" {{if eq .Banner "thinkertoy"}}checked{{end}}>
                        <span>Thinkertoy</span>
                    </label>
                </div>
            </div>

            <button type="submit">Generate ASCII Art</button>
        </form>

        {{if .Result}}
        <div class="result-container">
            <h2>Your ASCII Art:</h2>
            <pre>{{.Result}}</pre>
        </div>
        {{end}}
    </div>
</body>
</html>
